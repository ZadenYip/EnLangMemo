<div class="dictionary-page">
  <mat-card class="context-card">
    <mat-card-header>
      <div mat-card-avatar class="avatar-icon">
        <mat-icon>menu_book</mat-icon>
      </div>
      <mat-card-title>当前选中文本</mat-card-title>
      <mat-card-subtitle>占位符 · 语言/来源</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="selected-text">
        <div class="label">文本</div>
        <div class="value">PLACEHOLDER_SELECTED_TEXT</div>
      </div>
      <mat-divider></mat-divider>
      <div class="context-sentence">
        <div class="label">上下文句子</div>
        <div class="value">PLACEHOLDER_CONTEXT_SENTENCE</div>
      </div>
    </mat-card-content>
    <mat-card-actions align="end">
      <button mat-flat-button color="primary">添加到卡片</button>
    </mat-card-actions>
  </mat-card>

  <mat-card class="meanings-card">
    <mat-card-header>
      <mat-card-title>释义列表</mat-card-title>
      <mat-card-subtitle>PLACEHOLDER_WORD</mat-card-subtitle>
    </mat-card-header>
    <mat-card-content>
      <div class="word-meta">
        <span class="pos">PLACEHOLDER_POS</span>
        <span class="phonetic">/PLACEHOLDER_PHONETIC/</span>
      </div>
      <div class="meaning-scroll">
        <div class="meaning-cards">
          @for (card of meaningCards; track $index) {
            <app-meaning-card
              [senseLabel]="card.senseLabel"
              [badge]="card.badge"
              [meaningLines]="card.meaningLines"
              [meaningZh]="card.meaningZh"
              [examples]="card.examples"
            ></app-meaning-card>
          }
        </div>
      </div>
    </mat-card-content>
  </mat-card>
</div>
